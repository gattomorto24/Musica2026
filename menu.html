<script>
// Provide minimal menu functions if not defined by the page
window.toggleMenu = window.toggleMenu || function() {
    const m = document.getElementById('mobile-menu');
    if (!m) return;
    const isOpen = m.style.display === 'flex';
    m.style.display = isOpen ? 'none' : 'flex';
    document.body.classList.toggle('mobile-menu-open', !isOpen);
    document.body.style.overflow = !isOpen ? 'hidden' : '';
};

window.mobileTab = window.mobileTab || function(t) {
    if (typeof showTab === 'function') {
        showTab(t);
        if (typeof toggleMenu === 'function') toggleMenu();
        return;
    }
    if (typeof toggleMenu === 'function') toggleMenu();
    // fallback: navigate to index with hash
    window.location.href = 'index.html#' + t;
};

window.navigateToSection = window.navigateToSection || function(t) {
    if (typeof showTab === 'function') {
        showTab(t);
        return;
    }
    // If we're not on index, go there with the hash so index will open the section
    window.location.href = 'index.html#' + t;
};

window.mobileNavigate = window.mobileNavigate || function(url) {
    if (typeof toggleMenu === 'function') toggleMenu();
    window.location.href = url;
};
</script>
