<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MUSICA 2026 | CLOUD ELITE OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020202;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger: #ff2d55;
            --text: #ffffff;
            --card-radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #111, #020202);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Effetto Caricamento */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 2px solid var(--glass);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 40px 15px; }

        /* Header & Nav */
        header { text-align: center; margin-bottom: 40px; animation: slideDown 0.6s ease; }
        h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .nav {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px;
            position: sticky; top: 15px; z-index: 100;
        }
        .nav-btn {
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); color: #666;
            padding: 12px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; font-size: 0.8rem; text-transform: uppercase;
        }
        .nav-btn.active { 
            background: var(--accent); color: #000; border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: var(--card-radius);
            padding: clamp(15px, 5vw, 30px); margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; scale: 0.98; } to { opacity: 1; scale: 1; } }

        /* Tabelle e Liste */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 10px; text-align: left; font-size: 0.6rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }
        td { 
            padding: 18px 12px; background: rgba(255,255,255,0.01);
            border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border);
        }
        td:first-child { border-radius: 14px 0 0 14px; border-left: 1px solid var(--glass-border); width: 50px; }
        td:last-child { border-radius: 0 14px 14px 0; border-right: 1px solid var(--glass-border); text-align: right; }

        .song-title { font-weight: 600; font-size: 1rem; display: block; margin-bottom: 4px; }
        .badge { 
            font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 5px; 
            text-transform: uppercase; border: 1px solid transparent;
        }
        .badge-a { background: var(--accent); color: #000; }
        .badge-b { border-color: #ffb800; color: #ffb800; }
        .badge-c { border-color: #333; color: #666; }

        /* Input area */
        textarea {
            width: 100%; height: 280px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 18px; color: var(--accent); padding: 20px; font-family: 'Fira Code', monospace;
            font-size: 0.85rem; margin-bottom: 20px; outline: none;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 1px;
        }
        .btn-save { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn-reset { 
            background: transparent; border: 1px solid var(--danger); 
            color: var(--danger); margin-top: 50px; opacity: 0.4; font-size: 0.7rem;
        }
        .btn-reset:hover { opacity: 1; background: var(--danger); color: #fff; }

        /* Mobile specific scroll e layout */
        @media (max-width: 600px) {
            .container { padding: 20px 10px; }
            td { padding: 14px 10px; }
            .song-title { font-size: 0.9rem; }
            .nav-btn { padding: 10px 15px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="container">
    <header>
        <h1>MUSICA <span style="font-weight: 300;">2026</span></h1>
        <p id="db-indicator" style="font-size: 10px; color: #333; margin-top: 8px; letter-spacing: 2px;">DISCONNECTED</p>
    </header>

    <div class="nav">
        <button id="nav-live" class="nav-btn active" onclick="showTab('live')">Classifica</button>
        <button id="nav-upd" class="nav-btn" onclick="showTab('upd')">Aggiorna</button>
    </div>

    <div id="tab-live" class="glass-card">
        <table>
            <thead><tr><th>Pos</th><th>Brano</th><th>Punti</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>
    </div>

    <div id="tab-upd" style="display:none;">
        <div class="glass-card">
            <h2 style="margin-bottom:20px; font-weight:800; font-size: 1.2rem;">Settimana <span id="week-id" style="color:var(--accent)">-</span></h2>
            <textarea id="input-data" placeholder="1. Nome Canzone (Artista)&#10;2. Titolo Brano..."></textarea>
            <button class="btn-action btn-save" onclick="handleUpdate()">Pubblica nel Cloud</button>
        </div>
        
        <button class="btn-action btn-reset" onclick="resetDatabase()">RESET DATABASE TOTALE</button>
    </div>
</div>

<script>
    const SB_URL = 'https://pncoijuwnpjotuhaadnm.supabase.co'; 
    const SB_KEY = 'sb_publishable_N18u9kZBONU3rohS7XoYOQ_UJPaTSUe';
    const client = supabase.createClient(SB_URL, SB_KEY);

    let state = { week: 1, songs: {} };

    async function load() {
        try {
            const { data } = await client.from('classifiche').select('data_json').order('id', { ascending: false }).limit(1);
            if (data && data.length > 0) {
                state = data[0].data_json;
                document.getElementById('db-indicator').innerText = "CLOUD SYNC ACTIVE";
            }
            render();
        } catch(e) { console.error(e); }
        
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display='none', 500);
    }

    function render() {
        const body = document.getElementById('ranking-body');
        const sorted = Object.entries(state.songs).sort((a,b) => b[1].pts - a[1].pts);
        
        body.innerHTML = sorted.map(([name, d], i) => `
            <tr>
                <td style="font-family:'Fira Code'; opacity:0.3; font-size:0.8rem">#${i+1}</td>
                <td>
                    <span class="song-title">${name}</span>
                    <span class="badge badge-${d.l.toLowerCase()}">Serie ${d.l}</span>
                </td>
                <td style="color:var(--accent); font-weight:800; font-family:'Fira Code'">${d.pts}</td>
            </tr>
        `).join('');
        document.getElementById('week-id').innerText = state.week;
    }

    async function handleUpdate() {
        const raw = document.getElementById('input-data').value;
        if(!raw) return alert("Tony, inserisci i dati!");

        const lines = raw.split('\n').filter(l => l.trim() !== "");
        
        lines.forEach((line, index) => {
            // PULIZIA: Rimuove numero iniziale e tutto quello che c'è nelle parentesi
            let name = line.replace(/^\d+\.\s*/, '').split('(')[0].trim();
            let pos = index + 1;
            
            if(!state.songs[name]) state.songs[name] = { pts: 0, l: 'C' };
            let s = state.songs[name];
            let nL = pos <= 20 ? 'A' : (pos <= 50 ? 'B' : 'C');
            
            // Punti
            let p = (nL === 'A') ? 20 : (nL === 'B' ? 10 : 2);
            if(pos === 1) p = 35; 

            s.pts += p;
            s.l = nL;
        });

        state.week++;
        const { error } = await client.from('classifiche').insert([{ data_json: state }]);
        if(error) alert("Errore: " + error.message);
        else location.reload();
    }

    async function resetDatabase() {
        if(!confirm("ATTENZIONE: Questo cancellerà tutta la classifica. Procedo?")) return;
        state = { week: 1, songs: {} };
        await client.from('classifiche').insert([{ data_json: state }]);
        location.reload();
    }

    function showTab(t) {
        document.getElementById('tab-live').style.display = t === 'live' ? 'block' : 'none';
        document.getElementById('tab-upd').style.display = t === 'upd' ? 'block' : 'none';
        document.getElementById('nav-live').classList.toggle('active', t === 'live');
        document.getElementById('nav-upd').classList.toggle('active', t === 'upd');
    }

    load();
</script>
</body>
</html>
